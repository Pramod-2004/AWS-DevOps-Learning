<!DOCTYPE html>
<html>
<head>

<title>Pramod Study LMS</title>

<meta name="viewport" content="width=device-width,initial-scale=1">

<style>

body{
margin:0;
font-family:Segoe UI;
background:#f5f6fb;
}

.sidebar{
position:fixed;
width:240px;
height:100vh;
background:white;
box-shadow:0 0 10px rgba(0,0,0,0.08);
padding:20px;
}

.logo{
font-size:22px;
font-weight:600;
margin-bottom:30px;
}

.menu a{
display:block;
padding:10px;
margin-bottom:8px;
color:#444;
text-decoration:none;
border-radius:8px;
}

.menu a:hover{
background:#f0f2ff;
}

.main{
margin-left:260px;
padding:30px;
}

.topcards{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
}

.card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 5px 20px rgba(0,0,0,0.05);
}

.chart{
margin-top:30px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
padding:12px;
border-bottom:1px solid #eee;
text-align:left;
}

button{
padding:6px 10px;
border:none;
background:#6c63ff;
color:white;
border-radius:6px;
cursor:pointer;
}

.login{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:#eef1ff;
}

.loginbox{
background:white;
padding:40px;
border-radius:10px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

input{
padding:10px;
margin:5px;
}

</style>

</head>

<body>

<div id="login" class="login">

<div class="loginbox">

<h2>Study LMS Login</h2>

<input id="user" placeholder="Username"><br>
<input id="pass" type="password" placeholder="Password"><br>

<button onclick="login()">Login</button>

<p id="error" style="color:red"></p>

</div>

</div>

<div id="dashboard" style="display:none">

<div class="sidebar">

<div class="logo">Study LMS</div>

<div class="menu">

<a>Dashboard</a>
<a>Exams</a>
<a>LMS</a>
<a>Questions</a>
<a>Students</a>
<a>Results Database</a>
<a>Statistics</a>
<a>Certificates</a>
<a>Surveys</a>
<a>Settings</a>
<a>Help</a>

</div>

</div>

<div class="main">

<h1>Good Morning, Pramod</h1>

<div class="topcards">

<div class="card">
<h3>Grade</h3>
<p id="grade">87%</p>
</div>

<div class="card">
<h3>Active Students</h3>
<p>536</p>
</div>

<div class="card">
<h3>Questions</h3>
<p>64</p>
</div>

<div class="card">
<h3>Study Topics</h3>
<p id="totalTopics">0</p>
</div>

</div>

<div class="card chart">

<h3>Add Study Topic</h3>

<input id="topicName" placeholder="Topic">
<input id="topicHours" placeholder="Hours">

<button onclick="addTopic()">Add</button>

</div>

<div class="card">

<h3>Study Habit Table</h3>

<table>

<thead>

<tr>
<th>Topic</th>
<th>Hours</th>
<th>Date</th>
<th>Action</th>
</tr>

</thead>

<tbody id="tableData">

</tbody>

</table>

</div>

</div>

</div>

<script>

const USER="pramod"
const PASS="pramod@1234"

function login(){

let u=document.getElementById("user").value
let p=document.getElementById("pass").value

if(u===USER && p===PASS){

document.getElementById("login").style.display="none"
document.getElementById("dashboard").style.display="block"

load()

}else{

document.getElementById("error").innerText="Invalid credentials"

}

}

function addTopic(){

let name=document.getElementById("topicName").value
let hours=document.getElementById("topicHours").value
let date=new Date().toLocaleDateString()

let data=JSON.parse(localStorage.getItem("study"))||[]

data.push({name,hours,date})

localStorage.setItem("study",JSON.stringify(data))

load()

}

function load(){

let data=JSON.parse(localStorage.getItem("study"))||[]

let table=document.getElementById("tableData")

table.innerHTML=""

data.forEach((d,i)=>{

let row=

`<tr>
<td>${d.name}</td>
<td>${d.hours}</td>
<td>${d.date}</td>
<td><button onclick="del(${i})">Delete</button></td>
</tr>`

table.innerHTML+=row

})

document.getElementById("totalTopics").innerText=data.length

}

function del(i){

let data=JSON.parse(localStorage.getItem("study"))

data.splice(i,1)

localStorage.setItem("study",JSON.stringify(data))

load()

}

</script>

</body>
</html>
