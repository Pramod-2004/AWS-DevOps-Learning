<!DOCTYPE html>
<html>
<head>

<title>Pramod Study LMS</title>

<meta name="viewport" content="width=device-width,initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* ---------- GLOBAL ---------- */

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Inter,Arial;
background:linear-gradient(120deg,#eef2ff,#f7f8ff,#e9f6f3);
color:#333;
transition:0.3s;
}

/* ---------- LOGIN ---------- */

.login-container{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.login-box{
background:white;
padding:40px;
border-radius:16px;
box-shadow:0 15px 40px rgba(0,0,0,0.1);
width:320px;
text-align:center;
}

.login-title{
margin-bottom:20px;
font-weight:600;
}

.login-input{
width:100%;
padding:12px;
margin-bottom:12px;
border-radius:8px;
border:1px solid #ddd;
transition:0.3s;
}

.login-input:focus{
border-color:#7c6cff;
outline:none;
box-shadow:0 0 8px rgba(124,108,255,0.2);
}

.login-button{
width:100%;
padding:12px;
border:none;
background:#7c6cff;
color:white;
border-radius:8px;
cursor:pointer;
transition:0.3s;
}

.login-button:hover{
transform:translateY(-2px);
box-shadow:0 8px 20px rgba(124,108,255,0.3);
}

/* ---------- SIDEBAR ---------- */

.sidebar{
width:230px;
height:100vh;
position:fixed;
background:white;
padding:25px;
box-shadow:0 0 30px rgba(0,0,0,0.05);
}

.sidebar-logo{
font-size:20px;
font-weight:600;
margin-bottom:30px;
}

.sidebar-menu{
display:flex;
flex-direction:column;
gap:10px;
}

.sidebar-item{
padding:10px 12px;
border-radius:8px;
cursor:pointer;
transition:0.3s;
}

.sidebar-item:hover{
background:#f0f2ff;
color:#7c6cff;
}

/* ---------- MAIN ---------- */

.main{
margin-left:250px;
padding:30px;
}

.dashboard-title{
font-size:26px;
font-weight:600;
margin-bottom:20px;
}

/* ---------- CARDS ---------- */

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-bottom:20px;
}

.card{
background:white;
padding:20px;
border-radius:16px;
box-shadow:0 10px 25px rgba(0,0,0,0.05);
transition:0.3s;
}

.card:hover{
transform:translateY(-4px);
box-shadow:0 15px 30px rgba(0,0,0,0.08);
}

.card-title{
font-size:14px;
color:#777;
}

.card-value{
font-size:28px;
font-weight:600;
margin-top:8px;
}

/* ---------- PROGRESS ---------- */

.progress-ring{
position:relative;
width:120px;
height:120px;
margin-top:10px;
}

.progress-text{
position:absolute;
top:42px;
left:42px;
font-weight:600;
}

/* ---------- CHART ---------- */

.chart-card{
margin-bottom:20px;
}

/* ---------- FORM ---------- */

.topic-form{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.form-input{
padding:10px;
border-radius:8px;
border:1px solid #ddd;
flex:1;
}

.form-input:focus{
outline:none;
border-color:#7c6cff;
}

.form-button{
background:#7c6cff;
color:white;
border:none;
padding:10px 16px;
border-radius:8px;
cursor:pointer;
transition:0.3s;
}

.form-button:hover{
transform:translateY(-2px);
box-shadow:0 6px 15px rgba(124,108,255,0.3);
}

/* ---------- TABLE ---------- */

.table-card{
margin-bottom:20px;
}

.study-table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

.study-table th{
background:#f5f6ff;
padding:12px;
text-align:left;
font-size:14px;
}

.study-table td{
padding:12px;
border-bottom:1px solid #eee;
}

.delete-btn{
background:#ff6b6b;
border:none;
padding:6px 12px;
color:white;
border-radius:6px;
cursor:pointer;
}

/* ---------- HEATMAP ---------- */

.heatmap{
display:grid;
grid-template-columns:repeat(14,20px);
gap:4px;
margin-top:10px;
}

.heat-day{
width:20px;
height:20px;
background:#e5e7eb;
border-radius:4px;
transition:0.2s;
}

.heat-day:hover{
transform:scale(1.2);
background:#7c6cff;
}

/* ---------- ROADMAP ---------- */

.roadmap{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
gap:10px;
}

.roadmap-item{
background:#f6f7ff;
padding:8px;
border-radius:6px;
}

/* ---------- TOAST ---------- */

.toast{
position:fixed;
bottom:30px;
right:30px;
background:#333;
color:white;
padding:12px 20px;
border-radius:8px;
opacity:0;
transition:0.3s;
}

.toast.show{
opacity:1;
}

/* ---------- DARK MODE ---------- */

.dark{
background:#111827;
color:white;
}

.dark .card{
background:#1f2937;
}

</style>

</head>

<body>

<div id="loginPage" class="login-container">

<div class="login-box">

<h2 class="login-title">Study LMS Login</h2>

<input id="user" class="login-input" placeholder="Username">

<input id="pass" class="login-input" type="password" placeholder="Password">

<button class="login-button" onclick="login()">Login</button>

<p id="error"></p>

</div>

</div>

<div id="dashboard" style="display:none">

<div class="sidebar">

<div class="sidebar-logo">Study LMS</div>

<div class="sidebar-menu">

<div class="sidebar-item">Dashboard</div>
<div class="sidebar-item">Study Tracker</div>
<div class="sidebar-item">Analytics</div>
<div class="sidebar-item">Roadmap</div>

<button onclick="toggleDark()">Toggle Mode</button>

</div>

</div>

<div class="main">

<div class="dashboard-title">Welcome Pramod</div>

<div class="cards">

<div class="card">

<div class="card-title">Progress</div>

<div class="progress-ring">

<svg width="120" height="120">

<circle cx="60" cy="60" r="50" stroke="#eee" stroke-width="10" fill="none"/>

<circle id="circle" cx="60" cy="60" r="50"
stroke="#7c6cff"
stroke-width="10"
fill="none"
stroke-dasharray="314"
stroke-dashoffset="314"/>

</svg>

<div id="progressText" class="progress-text">0%</div>

</div>

</div>

<div class="card">
<div class="card-title">Topics</div>
<div id="topicCount" class="card-value">0</div>
</div>

<div class="card">
<div class="card-title">Hours</div>
<div id="hourCount" class="card-value">0</div>
</div>

</div>

<div class="card chart-card">

<h3>Study Hours</h3>

<canvas id="chart"></canvas>

</div>

<div class="card">

<h3>Add Study Topic</h3>

<div class="topic-form">

<input id="topicInput" class="form-input" placeholder="Topic">

<input id="hourInput" class="form-input" placeholder="Hours">

<button class="form-button" onclick="addTopic()">Add</button>

</div>

</div>

<div class="card table-card">

<h3>Study Tracker</h3>

<table class="study-table">

<thead>
<tr>
<th>Topic</th>
<th>Hours</th>
<th>Date</th>
<th>Action</th>
</tr>
</thead>

<tbody id="table"></tbody>

</table>

</div>

<div class="card">

<h3>Study Heatmap</h3>

<div id="heatmap" class="heatmap"></div>

</div>

<div class="card">

<h3>DevOps Learning Tracker</h3>

<div class="roadmap">

<div class="roadmap-item"><input type="checkbox"> Linux</div>
<div class="roadmap-item"><input type="checkbox"> Git</div>
<div class="roadmap-item"><input type="checkbox"> Docker</div>
<div class="roadmap-item"><input type="checkbox"> Kubernetes</div>
<div class="roadmap-item"><input type="checkbox"> Terraform</div>
<div class="roadmap-item"><input type="checkbox"> CI/CD</div>
<div class="roadmap-item"><input type="checkbox"> Monitoring</div>
<div class="roadmap-item"><input type="checkbox"> AWS</div>

</div>

</div>

</div>

</div>

<div id="toast" class="toast"></div>

<script>

const USER="pramod"
const PASS="pramod@1234"

let topics=JSON.parse(localStorage.getItem("topics"))||[]

function login(){

if(user.value===USER && pass.value===PASS){

loginPage.style.display="none"
dashboard.style.display="block"

showToast("Login successful")

render()

}else{

error.innerText="Invalid login"

}

}

function addTopic(){

let topic=topicInput.value
let hours=hourInput.value

if(topic===""||hours===""){
showToast("Fill all fields")
return
}

topics.push({
topic,
hours,
date:new Date().toLocaleDateString()
})

localStorage.setItem("topics",JSON.stringify(topics))

showToast("Topic added")

render()

}

function render(){

let table=document.getElementById("table")

table.innerHTML=""

let totalHours=0

topics.forEach((t,i)=>{

totalHours+=Number(t.hours)

table.innerHTML+=`

<tr>
<td>${t.topic}</td>
<td>${t.hours}</td>
<td>${t.date}</td>
<td><button class="delete-btn" onclick="del(${i})">Delete</button></td>
</tr>

`

})

topicCount.innerText=topics.length
hourCount.innerText=totalHours

updateProgress()

drawChart()

drawHeatmap()

}

function del(i){

topics.splice(i,1)

localStorage.setItem("topics",JSON.stringify(topics))

showToast("Topic deleted")

render()

}

function updateProgress(){

let percent=Math.min(topics.length*10,100)

let offset=314-(314*percent/100)

circle.style.strokeDashoffset=offset

progressText.innerText=percent+"%"

}

let chart

function drawChart(){

let ctx=document.getElementById("chart")

if(chart) chart.destroy()

chart=new Chart(ctx,{
type:"bar",
data:{
labels:topics.map(t=>t.topic),
datasets:[{
label:"Hours",
data:topics.map(t=>t.hours)
}]
}
})

}

function drawHeatmap(){

let heat=document.getElementById("heatmap")

heat.innerHTML=""

for(let i=0;i<70;i++){

let d=document.createElement("div")

d.className="heat-day"

heat.appendChild(d)

}

}

function toggleDark(){

document.body.classList.toggle("dark")

}

function showToast(msg){

toast.innerText=msg

toast.classList.add("show")

setTimeout(()=>{
toast.classList.remove("show")
},2000)

}

</script>

</body>
</html>
